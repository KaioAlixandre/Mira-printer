<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mira AutoPrint - Login</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="scanline"></div>

    <div class="setup-wrapper">
      <div class="setup-panel">

        <div class="setup-logo">
          <h1><span class="brand-dot">M</span>ira<span style="color:var(--red)">Delivery</span></h1>
        </div>

        <p class="setup-subtitle">// autenticação do AutoPrint</p>

        <p class="note">
          Use o mesmo <strong>telefone</strong> e senha de <strong>admin/master</strong>
          do painel da loja.
        </p>

        <div style="height:20px;"></div>

        <div class="setup-form" id="form">
          <div class="setup-field">
            <label for="phone">Telefone (WhatsApp)</label>
            <input id="phone" type="tel" inputmode="tel" placeholder="11999999999" required autocomplete="tel" />
          </div>
          <div class="setup-field">
            <label for="pass">Senha</label>
            <input id="pass" type="password" required autocomplete="current-password" />
          </div>

          <p class="errbox" id="formErr"></p>

          <button type="button" class="btn-primary" id="submitBtn">Entrar</button>
        </div>

      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/gh/IonDen/ion.sound@3.0.7/js/ion.sound.min.js"></script>
    <script src="setup.js"></script>
    <script src="print-bell.js"></script>
    <script>
      // Override form submit to use button click (keeps setup.js working)
      document.getElementById('submitBtn').addEventListener('click', () => {
        document.getElementById('form').dispatchEvent(
          Object.assign(new Event('submit'), { preventDefault: () => {} })
        );
      });
    </script>
  </body>
</html>
